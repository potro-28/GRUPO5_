<!DOCTYPE html>
{% load static %}
{% load widget_tweaks %}
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro</title>

  <!-- CSS desde static -->
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

<div class="container">

  <div class="form-section">

    <h2>Crear cuenta</h2>
    <h1>Regístrate</h1>

    <!-- Formulario Django -->
    <form method="post">
      {% csrf_token %}

      <!-- Nombre -->
      <input 
        type="text"
        name="nombre"
        id="name"
        placeholder="Nombre completo"
        required
      >

      <!-- Correo -->
      <input
        type="email"
        name="email"
        id="correoLogin"
        placeholder="Correo electrónico"
        required
        pattern="[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$"
        title="Debe ser un correo válido (ejemplo@dominio.com)"
      >

      <!-- Contraseña -->
      <div class="password-container">

        <input
          type="password"
          name="password"
          id="passwordLogin"
          placeholder="Contraseña"
          required
          pattern="(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*]).{6,}"
          title="Debe tener al menos 1 mayúscula, 1 número y 1 carácter especial, mínimo 6 caracteres"
        >

        <i class="fas fa-eye toggle-password"
           onclick="togglePassword('passwordLogin', this)">
        </i>

      </div>

      <!-- Confirmar contraseña -->
      <div class="password-container">

        <input
          type="password"
          name="confirm_password"
          id="confirmPassword"
          placeholder="Confirmar contraseña"
          required
        >

        <i class="fas fa-eye toggle-password"
           onclick="togglePassword('confirmPassword', this)">
        </i>

      </div>

      <button type="submit">Registrarme</button>

    </form>

    <p class="login-text">
      ¿Ya tienes cuenta?
      <a href="{% url 'login:login' %}">Inicia sesión</a>
    </p>

  </div>

  <div class="image-section"></div>

</div>

<!-- JS desde static -->
<script src="{% static 'login/js/registro.js' %}"></script>

</body>
</html>
