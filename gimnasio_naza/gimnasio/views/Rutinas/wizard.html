{% extends 'body.html' %}
{% block contenido %}

<div class="container">

    <h3 class="mb-4">Crear Rutina (Wizard Pro)</h3>

    <!-- 🔵 PROGRESS -->
    <div class="progress mb-4">
        <div id="barra" class="progress-bar" style="width:25%"></div>
    </div>

    <!-- PASO 1 -->
    <div class="step" id="step1">
    <h5>Datos de Usuario</h5>

    <input id="username" placeholder="Username" class="form-control mb-2">
    <input id="password" type="password" placeholder="Password" class="form-control mb-2">

    <input id="documento" placeholder="Documento" class="form-control mb-2">
    <input id="nombre" placeholder="Nombre" class="form-control mb-2">
    <input id="apellido" placeholder="Apellido" class="form-control mb-2">

    <input type="date" id="fecha_nacimiento" class="form-control mb-2">

    <input id="telefono" placeholder="Teléfono" class="form-control mb-2">
    <input id="correo" placeholder="Correo" class="form-control mb-2">

    <input id="peso_usuario" placeholder="Peso usuario" class="form-control mb-2">
    <input id="altura_usuario" placeholder="Altura usuario" class="form-control mb-2">

    <select id="genero" class="form-control mb-2">
        <option value="M">Masculino</option>
        <option value="F">Femenino</option>
    </select>

    <button class="btn btn-primary" onclick="next(1)">Siguiente</button>
</div>

    <!-- PASO 2 -->
    <div class="step d-none" id="step2">
        <h5>Nutrición</h5>

        <select id="nivel_actividad" class="form-control mb-2">
            <option value="bajo">Bajo</option>
            <option value="medio">Medio</option>
            <option value="alto">Alto</option>
        </select>

        <select id="tipo_objetivo" class="form-control mb-2">
            <option value="perder_peso">Perder peso</option>
            <option value="mantener">Mantener</option>
            <option value="ganar_masa">Ganar masa</option>
        </select>

        <select id="tipo_dieta" class="form-control mb-2">
            <option value="keto">Keto</option>
            <option value="balanceada">Balanceada</option>
            <option value="hiperproteica">Hiperproteica</option>
        </select>

        <button class="btn btn-secondary" onclick="back(2)">Atrás</button>
        <button class="btn btn-primary" onclick="next(2)">Siguiente</button>
    </div>

    <!-- PASO 3 -->
    <div class="step d-none" id="step3">
        <h5>Masa Corporal</h5>

        <input id="peso" placeholder="Peso" class="form-control mb-2">
        <input id="altura" placeholder="Altura" class="form-control mb-2">
        <input type="date" id="fecha" class="form-control mb-2">

        <button class="btn btn-secondary" onclick="back(3)">Atrás</button>
        <button class="btn btn-primary" onclick="next(3)">Siguiente</button>
    </div>

    <!-- PASO 4 -->
    <div class="step d-none" id="step4">
        <h5>Rutina</h5>

        <select id="tipo" class="form-control mb-2">
            <option value="FUERZA">Fuerza</option>
            <option value="CARDIO">Cardio</option>
        </select>

        <input id="dias" type="number" placeholder="Días" class="form-control mb-2">

        <select id="distribucion" class="form-control mb-2">
            <option value="SUPERIOR">Superior</option>
            <option value="INFERIOR">Inferior</option>
            <option value="COMPLETA">Completa</option>
        </select>

        <button class="btn btn-secondary" onclick="back(4)">Atrás</button>
        <button class="btn btn-success" onclick="guardar()">Guardar Todo</button>
    </div>

</div>

{% endblock %}
{% block js %}
<script>
let data = {};

function next(step) {

    if (step === 1) {
    data.username = document.getElementById("username").value;
    data.password = document.getElementById("password").value;

    data.documento = document.getElementById("documento").value;
    data.nombre = document.getElementById("nombre").value;
    data.apellido = document.getElementById("apellido").value;

    data.fecha_nacimiento = document.getElementById("fecha_nacimiento").value;
    data.telefono = document.getElementById("telefono").value;
    data.correo = document.getElementById("correo").value;

    data.peso_usuario = document.getElementById("peso_usuario").value;
    data.altura_usuario = document.getElementById("altura_usuario").value;
    data.genero = document.getElementById("genero").value;
    }

    if (step === 2) {
        data.nivel_actividad = document.getElementById("nivel_actividad").value;
        data.tipo_objetivo = document.getElementById("tipo_objetivo").value;
        data.tipo_dieta = document.getElementById("tipo_dieta").value;
    }

    if (step === 3) {
        data.peso = document.getElementById("peso").value;
        data.altura = document.getElementById("altura").value;
        data.fecha = document.getElementById("fecha").value;
    }

    document.getElementById("step"+step).classList.add("d-none");
    document.getElementById("step"+(step+1)).classList.remove("d-none");

    document.getElementById("barra").style.width = (step+1)*25 + "%";
}

function back(step){
    document.getElementById("step"+step).classList.add("d-none");
    document.getElementById("step"+(step-1)).classList.remove("d-none");
    document.getElementById("barra").style.width = (step-1)*25 + "%";
}

function guardar(){

    data.tipo = document.getElementById("tipo").value;
    data.dias = document.getElementById("dias").value;
    data.distribucion = document.getElementById("distribucion").value;

    fetch("{% url 'crear_rutina_wizard' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie('csrftoken')
        },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        Swal.fire("OK", "Guardado completo", "success");
    });
}
</script>
{% endblock %}
