{% extends 'body.html' %}

{% block contenido %}
<form method="post" action=".">
    <div class="card card-danger shadow-sm">
        <div class="card-header bg-danger text-white">
            <h3 class="card-title" style="margin: 0;">
                <i class="fas fa-trash"></i> {{ titulo }}
            </h3>
        </div>
        <div class="card-body">
            {% csrf_token %}
            <div class="alert alert-danger mb-0">
                <h5><i class="icon fas fa-exclamation-triangle"></i> Advertencia!</h5>
                <p class="mb-0">
                    Estas seguro que deseas eliminar permanentemente al usuario <strong>{{ object.username }}</strong> ({{ object.first_name }} {{ object.last_name }})?
                    Esta accion no se puede deshacer.
                </p>
            </div>
        </div>
        <div class="card-footer text-end">
            <a href="{{ listar_url }}" class="btn btn-secondary me-2">
                <i class="fas fa-times"></i> Cancelar
            </a>
            <button type="submit" class="btn btn-danger">
                <i class="fas fa-trash-alt"></i> Si, Eliminar Usuario
            </button>
        </div>
    </div>
</form>
{% endblock %}
