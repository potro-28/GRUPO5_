{% load static %}

<link rel="stylesheet" href="{% static 'css/topbar.css' %}">

<header class="topbar">

    <!-- IZQUIERDA -->
    <div class="topbar-left">
        <i class="fas fa-bars menu-toggle" id="menuToggle"></i>

        <a href="{% url 'gimnasio:dashboard' %}" class="logo-link">
            <img src="{% static 'assets/img/avatars/logo.png' %}" class="logo-img">
            <span class="logo-text">GYM<br>NAZARETH</span>
        </a>
    </div>

    <!-- DERECHA -->
    <div class="topbar-right">

        <!-- Backup -->
        <div class="btn-group">
            <button class="btn btn-primary dropdown-toggle" data-bs-toggle="dropdown">
                <i class="fa-solid fa-database"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <a class="dropdown-item" href="{% url 'gimnasio:backup' %}">
                        <i class="fa-solid fa-folder-open me-2"></i>Ir a Backup
                    </a>
                </li>
                <li>
                    <form action="{% url 'gimnasio:backup' %}" method="post">
                        {% csrf_token %}
                        <input type="hidden" name="accion" value="backup_completo">
                        <button type="submit" class="dropdown-item">
                            <i class="fa-solid fa-download me-2"></i>Backup completo
                        </button>
                    </form>
                </li>
            </ul>
        </div>

        <!-- Buscador -->
        <div class="search-container d-none d-lg-flex">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Buscar">
        </div>

        <!-- Usuario -->
        <div class="top-icons">
            <i class="fas fa-bell icon-btn"></i>

            <div class="dropdown">
                <a class="user-trigger dropdown-toggle" data-bs-toggle="dropdown">
                    <span class="username-topbar d-none d-md-inline">
                        {{ user.username }}
                    </span>
                    <img src="{% static 'assets/img/avatars/1.png' %}" class="avatar-img">
                </a>

                <div class="dropdown-menu dropdown-menu-end user-dropdown">
                    <div class="user-dropdown-header">
                        <img src="{% static 'assets/img/avatars/1.png' %}" class="user-dropdown-avatar">
                        <div>
                            <span class="small text-muted">Administrador</span>
                            <h6 class="m-0">{{ user.username }}</h6>
                        </div>
                    </div>

                    <div class="dropdown-divider"></div>

                    <div class="px-3 py-2">
                        <form method="post" action="{% url 'login:logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-primary w-100">
                                Cerrar Sesión
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</header>
