{%extends 'body.html'%}
{% load widget_tweaks %}
{%block contenido%}

<form method="post" action="">
    <div class="card card-default">
        <div class="card-header">
            <h3 class="card-title">
                <i class="fas fa-search"></i>
                {{ titulo }}
            </h3>
        </div>

        <div class="card-body">
            {% csrf_token %}
            
            <div class="alert alert-danger alert-dismissible"><button type="button" class="close" data-bs-dismiss="alert" aria-hidden="true">×</button>
           <h5><i class="icon fas fa-ban"></i> Alert!</h5> {{form.errors}}.
          </div>
        {% for field in form.visible_fields %}
        <div class = "form-group"></div>
        <label for = 'name' > {{field.label}}: </label> 
        {{ field|add_class:'form-control'| attr:'autocomplete:off' }}
        </div>
        {% endfor %}

        <div class="card-footer">
            <button type="submit" class="btn btn-primary btn-xs">
                <i class="fas fa-plus"></i> Guardar registro
            </button>
        </div>
    </div>
    {% block js %}
    <script>
        Swal.fire({
            title: "Error",
            text: "Verificar los campos ingresados",
            icon: "error"
        });
    </script>
    {% endblock %}
</form>

{% endblock %}
