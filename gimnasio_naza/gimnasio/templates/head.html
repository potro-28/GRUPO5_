{%load static%} {% block head %}
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gimnasio Nazá</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <style>
    :root {
      --bg-body: #f4f7fa;
      --bg-white: #ffffff;
      --primary-blue: #5b73e8;
      --primary-light: #eef2fa;
      --text-dark: #2c3e50;
      --text-muted: #8b9eb0;
      --border-color: #eaeff5;
      --sidebar-width: 260px;
      --sidebar-collapsed-width: 80px;
      /* Transición elástica premium global */
      --transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background-color: var(--bg-body);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ==================== ANIMACIONES ULTRA PREMIUM ==================== */
    /* Aparición con rebote */
    @keyframes revealBounce {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
      }
      70% {
        transform: translateY(-10px) scale(1.02);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

        /* ==================== TOPBAR ==================== */
        .topbar { background-color: #267CA7; height: 70px; display: flex; align-items: center; gap:15px; justify-content: space-between; padding: 0 20px; color: white; z-index: 1000; box-shadow: 0 4px 15px rgba(91, 115, 232, 0.3); position: relative; }
        .topbar-left { display: flex; align-items: center; gap: 5px; width: var(--sidebar-width); transition: var(--transition); }
        .menu-toggle { cursor: pointer; font-size: 20px; transition: var(--transition); }
        .menu-toggle:hover { transform: scale(1.2) rotate(180deg); }
        .logo { font-size: 22px; font-weight: bold; display: flex; align-items: center; margin-left:auto;  }
        
        .topbar-right{
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        /* Buscador Dinámico */
        .search-container { background: rgba(255, 255, 255, 0.2); border-radius: 20px; padding: 6px 15px; display: flex; align-items: center; width: 300px; transition: var(--transition); margin-left: auto; max-width: 250px }
        .search-container:focus-within { background: rgba(255, 255, 255, 1); width: 350px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);}
        .search-container i { color: white; transition: var(--transition); }
        .search-container:focus-within i { color: var(--primary-blue); }
        .search-container input { border: none; background: transparent; color: white; outline: none; padding: 5px 10px; width: 100%; transition: var(--transition);}
        .search-container:focus-within input { color: var(--text-dark); }
        .search-container input::placeholder { color: rgba(255, 255, 255, 0.8); }
        .topbar{display: flex;justify-content: space-between;align-items: center;}
        .topbar-right{display: flex;align-items: center;gap: 20px;}
        .search-container{margin-left: auto;}

    /* Clases de cascada (Stagger) */
    .stagger-1 {
      animation: revealBounce 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.1s;
      opacity: 0;
    }
    .stagger-2 {
      animation: revealBounce 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.25s;
      opacity: 0;
    }
    .stagger-3 {
      animation: revealBounce 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.4s;
      opacity: 0;
    }
    .stagger-4 {
      animation: revealBounce 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.55s;
      opacity: 0;
    }

    /* ==================== TOPBAR ==================== */
    .topbar {
      background-color: #267ca7;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      color: white;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(91, 115, 232, 0.3);
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 5px;
      width: var(--sidebar-width);
      transition: var(--transition);
    }
    .menu-toggle {
      cursor: pointer;
      font-size: 20px;
      transition: var(--transition);
    }
    .menu-toggle:hover {
      transform: scale(1.2) rotate(180deg);
    }
    .logo {
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 0px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 25px;
      flex-grow: 1;
      justify-content: space-between;
    }

    /* Buscador Dinámico */
    .search-container {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 6px 15px;
      display: flex;
      align-items: center;
      width: 300px;
      transition: var(--transition);
      margin-left: auto;
      max-width: 250px;
    }
    .search-container:focus-within {
      background: rgba(255, 255, 255, 1);
      width: 350px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }
    .search-container i {
      color: white;
      transition: var(--transition);
    }
    .search-container:focus-within i {
      color: var(--primary-blue);
    }
    .search-container input {
      border: none;
      background: transparent;
      color: white;
      outline: none;
      padding: 5px 10px;
      width: 100%;
      transition: var(--transition);
    }
    .search-container:focus-within input {
      color: var(--text-dark);
    }
    .search-container input::placeholder {
      color: rgba(255, 255, 255, 0.8);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .search-container {
      margin-left: auto;
    }

    .top-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .progress-badge {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 6px 15px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }
    .icon-btn {
      cursor: pointer;
      font-size: 18px;
      transition: var(--transition);
    }
    .icon-btn:hover {
      transform: translateY(-4px) scale(1.15);
      color: #d1d8ff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    /* ==================== LAYOUT PRINCIPAL ==================== */
    .main-container {
      display: flex;
      flex-grow: 1;
      overflow: hidden;
    }

    /* SIDEBAR PREMIUM */
    .sidebar {
      width: var(--sidebar-width);
      background-color: var(--bg-white);
      display: flex;
      flex-direction: column;
      transition: var(--transition);
      box-shadow: 2px 0 20px rgba(0, 0, 0, 0.04);
      z-index: 100;
      overflow-y: auto;
      overflow-x: hidden;
      border-right: 1px solid var(--border-color);
    }
    .sidebar::-webkit-scrollbar {
      width: 4px;
    }
    .sidebar::-webkit-scrollbar-thumb {
      background-color: #d1d8ff;
      border-radius: 10px;
    }

    .user-panel {
      text-align: center;
      padding: 30px 20px 20px;
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
      transition: var(--transition);
    }
    .profile-img-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 10px;
      transition: var(--transition);
      cursor: pointer;
    }
    .profile-img-wrapper:hover {
      transform: scale(1.1);
    }
    .profile-img-wrapper img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid white;
      box-shadow: 0 8px 20px rgba(91, 115, 232, 0.2);
      transition: var(--transition);
    }
    .profile-img-wrapper:hover img {
      box-shadow: 0 12px 25px rgba(91, 115, 232, 0.4);
      border-color: var(--primary-light);
    }

    .status-dot {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 14px;
      height: 14px;
      background-color: #ff4d4f;
      border-radius: 50%;
      border: 2px solid white;
      animation: pulseGlow 2s infinite;
    }
    .user-panel h3 {
      font-size: 16px;
      color: var(--text-dark);
      font-weight: 600;
      margin-bottom: 5px;
    }
    .badge-plan {
      background: linear-gradient(135deg, #00cfd5, #0093e9);
      color: white;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 600;
      display: inline-block;
      box-shadow: 0 4px 10px rgba(0, 207, 213, 0.3);
      transition: var(--transition);
    }
    .badge-plan:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 0 6px 15px rgba(0, 207, 213, 0.5);
    }

    .nav-menu {
      padding: 20px 15px;
      flex-grow: 1;
      list-style: none;
    }
    .nav-menu > li {
      margin-bottom: 5px;
    }
    .nav-menu li > a {
      display: flex;
      align-items: center;
      padding: 8px 15px;
      color: var(--text-dark);
      font-size: 14.5px;
      font-weight: 500;
      transition: var(--transition);
      border-radius: 30px;
      white-space: nowrap;
      text-decoration: none;
    }
    .icon-circle {
      min-width: 35px;
      height: 35px;
      border-radius: 50%;
      background-color: var(--primary-light);
      color: #267ca7;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-right: 15px;
      transition: var(--transition);
      font-size: 16px;
    }
    .nav-menu li.active > a,
    .nav-menu li > a:hover {
      background-color: var(--primary-light);
      transform: translateX(8px);
      letter-spacing: 0.3px;
    }
    .nav-menu li.active > a .icon-circle,
    .nav-menu li > a:hover .icon-circle {
      background-color: white;
      box-shadow: 0 4px 12px rgba(91, 115, 232, 0.2);
      transform: rotate(15deg) scale(1.1);
    }

    /* Submenu */
    .has-submenu .arrow-icon {
      margin-left: auto;
      font-size: 12px;
      transition: transform 0.4s;
    }
    .submenu {
      display: none;
      padding-left: 55px;
      margin-top: 5px;
      margin-bottom: 10px;
    }
    .submenu li {
      margin-bottom: 5px;
    }
    .submenu li a {
      padding: 6px 10px;
      font-size: 13.5px;
      color: var(--text-muted);
      border-radius: 8px;
      font-weight: 400;
      transition: var(--transition);
      border-left: none;
    }
    .submenu li a:hover {
      color: var(--primary-blue);
      transform: translateX(5px);
    }
    .has-submenu.open .submenu {
      display: block;
    }
    .has-submenu.open > a .arrow-icon {
      transform: rotate(180deg);
      color: var(--primary-blue);
    }

    /* Sidebar Colapsado */
    body.sidebar-collapsed .topbar-left {
      width: calc(var(--sidebar-collapsed-width) - 20px);
    }

    body.sidebar-collapsed .sidebar {
      width: var(--sidebar-collapsed-width);
    }
    body.sidebar-collapsed .user-panel h3,
    body.sidebar-collapsed .badge-plan,
    body.sidebar-collapsed .nav-menu li a span,
    body.sidebar-collapsed .arrow-icon {
      display: none;
    }
    body.sidebar-collapsed .nav-menu li > a {
      padding: 10px;
      justify-content: center;
      background: transparent !important;
      transform: none;
    }
    body.sidebar-collapsed .nav-menu li > a .icon-circle {
      margin-right: 0;
    }
    body.sidebar-collapsed .profile-img-wrapper img {
      width: 50px;
      height: 50px;
    }

    /* ==================== ÁREA DE CONTENIDO ==================== */
    .content-area {
      flex-grow: 1;
      padding: 30px 40px;
      overflow-y: auto;
      scroll-behavior: smooth;

      background-image: url("/static/img/fondo1.png.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }
    .page-header {
      margin-bottom: 30px;
    }
    .page-header h1 {
      color: #ffffff;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }
    .page-header p {
      color: #ffffff;
      font-size: 15px;
    }

    /* ----- CATEGORY STATS GRID (Top 4 Cards) ----- */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      margin-bottom: 35px;
    }
    .stat-card {
      background-color: var(--bg-white);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.8);
      display: flex;
      align-items: center;
      gap: 20px;
      transition: var(--transition);
      cursor: pointer;
    }
    .stat-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(91, 115, 232, 0.08);
    }

    .stat-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 22px;
      transition: var(--transition);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
    }
    .stat-card:hover .stat-icon {
      transform: scale(1.1) rotate(10deg);
    }
        /* Responsividad */
        @media (max-width: 1024px) {
            .search-container { display: none; }
            .trainers-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; height: calc(100vh - 70px); top: 70px; left: -100%; z-index: 1000; }
            .sidebar.mobile-active { left: 0; box-shadow: 5px 0 15px rgba(0,0,0,0.1); }
            body.sidebar-collapsed .sidebar { width: var(--sidebar-width); } 
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .trainers-grid { grid-template-columns: 1fr; }
        }
    .stat-info h2 {
      font-size: 26px;
      color: var(--text-dark);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-info p {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Colores con Degradados */
    .bg-blue {
      background: linear-gradient(135deg, #5b73e8, #8b9df3);
      box-shadow: 0 8px 20px rgba(91, 115, 232, 0.3) !important;
    }
    .bg-orange {
      background: linear-gradient(135deg, #f39c12, #f1c40f);
      box-shadow: 0 8px 20px rgba(243, 156, 18, 0.3) !important;
    }
    .bg-green {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      box-shadow: 0 8px 20px rgba(46, 204, 113, 0.3) !important;
    }
    .bg-teal {
      background: linear-gradient(135deg, #00cfd5, #00bcd4);
      box-shadow: 0 8px 20px rgba(0, 207, 213, 0.3) !important;
    }

    /* ----- TRAINERS GRID (Bottom Cards) ----- */
    .trainers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
    }

    .trainer-card {
      background-color: var(--bg-white);
      border-radius: 20px;
      padding: 35px 25px 25px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.8);
      transition: var(--transition);
      position: relative;
    }
    .trainer-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(91, 115, 232, 0.08);
      border-color: rgba(91, 115, 232, 0.2);
    }

    .trainer-img-wrapper {
      width: 100px;
      height: 100px;
      margin: 0 auto 15px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid #f0f3ff;
      transition: var(--transition);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
    }
    .trainer-card:hover .trainer-img-wrapper {
      border-color: var(--primary-blue);
      transform: scale(1.08);
      box-shadow: 0 15px 25px rgba(91, 115, 232, 0.2);
    }
    .trainer-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .trainer-card h3 {
      font-size: 18px;
      color: var(--text-dark);
      margin-bottom: 2px;
      font-weight: 600;
    }
    .trainer-card p.specialty {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 25px;
      font-weight: 500;
    }

    /* Stats del Entrenador */
    .trainer-stats {
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
      padding: 20px 0;
      margin-bottom: 25px;
      text-align: left;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      font-size: 13.5px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .stat-row:last-child {
      margin-bottom: 0;
    }

    /* Pill Badges transparentes que se colorean al hover */
    .badge-outline {
      border: 1.5px solid;
      padding: 3px 12px;
      border-radius: 15px;
      font-size: 11px;
      font-weight: 600;
      background-color: transparent;
      transition: var(--transition);
    }
    .trainer-card:hover .badge-outline.c-blue {
      background-color: #5b73e8;
      color: white;
    }
    .trainer-card:hover .badge-outline.c-teal {
      background-color: #00cfd5;
      color: white;
    }
    .trainer-card:hover .badge-outline.c-red {
      background-color: #ff4d4f;
      color: white;
    }

    .c-blue {
      color: #5b73e8;
      border-color: #5b73e8;
    }
    .c-teal {
      color: #00cfd5;
      border-color: #00cfd5;
    }
    .c-red {
      color: #ff4d4f;
      border-color: #ff4d4f;
    }

    /* Botón de perfil */
    .btn-profile {
      display: inline-block;
      width: 100%;
      background: linear-gradient(135deg, #5b73e8, #8b9df3);
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      transition: var(--transition);
      border: none;
      cursor: pointer;
      margin-bottom: 20px;
      box-shadow: 0 6px 15px rgba(91, 115, 232, 0.2);
    }
    .btn-profile:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(91, 115, 232, 0.4);
    }


    /* Estrellas */
    .trainer-stars {
      color: #ffc107;
      font-size: 14px;
      display: flex;
      justify-content: center;
      gap: 4px;
      transition: var(--transition);
    }
    .trainer-card:hover .trainer-stars {
      transform: scale(1.05);
    }

    /* Responsividad */
    @media (max-width: 1024px) {
      .search-container {
        display: none;
      }
      .trainers-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        height: calc(100vh - 70px);
        top: 70px;
        left: -100%;
        z-index: 1000;
      }
      .sidebar.mobile-active {
        left: 0;
        box-shadow: 5px 0 15px rgba(0, 0, 0, 0.1);
      }
      body.sidebar-collapsed .sidebar {
        width: var(--sidebar-width);
      }
      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .trainers-grid {
        grid-template-columns: 1fr;
      }
    }
    hr {
      border: 0;
      height: 2px;
      background: #eee;
    }
  </style>

  <!-- Favicon -->
  <link
    rel="icon"
    type="image/png"
    sizes="64x64"
    href="{% static 'assets/img/favicon/gym.jpeg' %}"
