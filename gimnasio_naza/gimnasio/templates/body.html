
{% extends 'home.html' %}
{% load static %}
{% block body %}
  <body>
    
    
    {% include 'header.html' %}
        <div class="main-container">
        
        {% include "aside.html" %}

        <main class="content-area">
            {% block contenido %}
            {% endblock contenido %}
        </main>
    </div>

    <script>
      // Toggle de Barra Lateral Animada
      document.getElementById('menuToggle').addEventListener('click', function () {
        if (window.innerWidth > 768) {
          document.body.classList.toggle('sidebar-collapsed')
          // Al contraer en desktop, asegurarnos de que el menú en acordeón se cierre
          document.querySelectorAll('.has-submenu').forEach((item) => item.classList.remove('open'))
        } else {
          document.getElementById('sidebar').classList.toggle('mobile-active')
        }
      })
      
      // Toggle Submenu (Acordeón)
      document.querySelectorAll('.submenu-toggle').forEach((toggle) => {
        toggle.addEventListener('click', function (e) {
          e.preventDefault()
          if (!document.body.classList.contains('sidebar-collapsed')) {
            const parentLi = this.parentElement
            parentLi.classList.toggle('open')
      
            const icon = this.querySelector('.arrow-icon')
            if (parentLi.classList.contains('open')) {
              icon.classList.replace('fa-chevron-right', 'fa-chevron-down')
            } else {
              icon.classList.replace('fa-chevron-down', 'fa-chevron-right')
            }
          }
        })
      })
    
    </script>
    <script src="{% static 'assets/vendor/libs/jquery/jquery.js' %}"></script>

    <script src="{% static 'assets/vendor/libs/popper/popper.js'%}"></script>
    <script src="{% static 'assets/vendor/js/bootstrap.js'%}"></script>
    <script src="{% static 'assets/vendor/libs/node-waves/node-waves.js'%}"></script>

    <script src="{% static 'assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js'%}"></script>

    <script src="{% static 'assets/vendor/js/menu.js'%}"></script>

    <!-- endbuild -->
    
    <!-- Vendors JS -->
    <script src="{% static 'assets/vendor/libs/apex-charts/apexcharts.js'%}"></script>

    <!-- Main JS -->

    <script src="{% static 'assets/js/main.js'%}"></script>

    <!-- Page JS -->
    <script src="{% static 'assets/js/dashboards-analytics.js'%}"></script>
    <script async="async" defer="defer" src="https://buttons.github.io/buttons.js"></script>
    <script src="{% static 'lib/sweetalert2/sweetalert2.all.min.js'%}"></script>

    {% block js %}{% endblock %}
    
    

  </body>
{% endblock body %}
